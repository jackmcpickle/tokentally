name: Publish reporter

on:
  push:
    branches: [main]

concurrency:
  group: publish-reporter
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, changelog, and tag
        id: release
        run: |
          set -euo pipefail
          pnpm exec commit-and-tag-version
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Trusted publishing (OIDC) — no npm token; provenance is implied.
      # Requires the Trusted Publisher config on npmjs.com for this repo/workflow.
      - name: Publish reporter to npm
        working-directory: reporter
        run: npm publish --access public

      - name: Push release commit and tag
        run: git push --follow-tags origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.version }}
          name: tokenmaxer v${{ steps.release.outputs.version }}
          generate_release_notes: true
