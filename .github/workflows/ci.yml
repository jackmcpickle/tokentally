name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: oxlint
        run: pnpm exec oxlint
      - name: oxfmt
        run: pnpm exec oxfmt --check .
      - name: typecheck
        run: pnpm typecheck
      - name: build
        run: pnpm build
      - name: test
        run: pnpm test
